name: CI — Build, Scan, Push

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: anand22022002/kubeinfra-frontend

permissions:
  contents: write
  security-events: write
  packages: write

jobs:
  ##############################################################
  # Stage 1 — SonarQube Code Quality Gate
  # Pipeline halts here if quality thresholds aren't met.
  # Nothing gets built further until code quality passes.
  ##############################################################
  sonarqube:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better SonarQube analysis

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  ##############################################################
  # Stage 2 — Build Docker Image
  ##############################################################
  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: sonarqube
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build image (do NOT push yet — Trivy scans first)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image tar for Trivy
        uses: actions/upload-artifact@v4
        with:
          name: image-tar
          path: /tmp/image.tar

  ##############################################################
  # Stage 3 — Trivy Vulnerability Scan
  # Fails on HIGH or CRITICAL CVEs — image is NOT pushed
  # to GHCR if this step fails.
  ##############################################################
  trivy-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image tar
        uses: actions/download-artifact@v4
        with:
          name: image-tar
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image.tar
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'        # Warn: scan reports CVEs but does not block build

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()            # Upload even on failure for visibility
        with:
          sarif_file: trivy-results.sarif

  ##############################################################
  # Stage 4 — Push to GHCR
  # Only reached if SonarQube + Trivy both pass.
  ##############################################################
  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: trivy-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Calculate short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push to GHCR
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image pushed summary
        run: |
          echo "### ✅ Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.push.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "GitHub Actions will update Kustomize with tag: ${{ steps.vars.outputs.sha_short }}." >> $GITHUB_STEP_SUMMARY

      - name: Update Kustomize Image Tag
        run: |
          cd k8s-manifests/boutique-app/overlays/dev
          sed -i '/name: ghcr.io\/anand22022002\/kubeinfra-frontend/{n;s/newTag: .*/newTag: "${{ steps.vars.outputs.sha_short }}"/}' kustomization.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add k8s-manifests/boutique-app/overlays/dev/kustomization.yaml
          git commit -m "chore(cd): update frontend image tag to ${{ steps.vars.outputs.sha_short }} [skip ci]"
          git push
