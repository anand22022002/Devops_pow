##############################################################
# Prometheus Stack — Helm Values
# Install with:
#   helm upgrade --install kube-prometheus-stack \
#     prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f k8s-manifests/monitoring/prometheus/values.yaml
##############################################################

fullnameOverride: kube-prometheus-stack

##############################################################
# Grafana
##############################################################
grafana:
  enabled: true
  adminPassword: "NoPassword"   # Override with a K8s Secret in production
  grafana.ini:
    server:
      root_url: "https://grafana.kubeinfra.site"
  # Pre-load dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 29
        datasource: Prometheus

##############################################################
# Alertmanager — Slack notifications
##############################################################
alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: slack-notifications
      routes:
        - matchers:
            - alertname = Watchdog
          receiver: "null"
    receivers:
      - name: "null"
      - name: slack-notifications
        slack_configs:
          - api_url: "REPLACE_WITH_SLACK_WEBHOOK_URL"
            channel: "#kubeinfra-alerts"
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
            text: |-
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Namespace:* {{ .Labels.namespace }}
              {{ end }}
            send_resolved: true

##############################################################
# Custom Alert Rules
##############################################################
additionalPrometheusRulesMap:
  kubeinfra-rules:
    groups:
      - name: kubeinfra.pods
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
              description: "Container {{ $labels.container }} has restarted {{ $value | humanize }} times in the last 15 minutes."

          - alert: HighMemoryUsage
            expr: |
              (container_memory_working_set_bytes{namespace="boutique"} /
               container_spec_memory_limit_bytes{namespace="boutique"}) > 0.85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage in boutique namespace"
              description: "Container {{ $labels.container }} is using >85% of its memory limit."

          - alert: PodNotReady
            expr: kube_pod_status_ready{condition="true"} == 0
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} not ready"
              description: "Pod has been in non-ready state for more than 10 minutes."

##############################################################
# Prometheus — retention and scrape config
##############################################################
prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

##############################################################
# Node Exporter — metrics for each worker node
##############################################################
nodeExporter:
  enabled: true

##############################################################
# kube-state-metrics — K8s object metrics
##############################################################
kubeStateMetrics:
  enabled: true
