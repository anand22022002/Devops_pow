##############################################################
# HTTPRoutes — route traffic to each service
#
# WITHOUT a domain: remove the `hostnames` field entirely.
#   The ALB will route ALL traffic to the first matching rule.
#   Access each service by path or via separate port-forward.
#
# WITH nip.io: set hostnames like:
#   hostnames: ["app.<ALB-IP>.nip.io"]
#
# WITH a real domain: set hostnames like:
#   hostnames: ["app.kubeinfra.site"]
#
# For the Loom video — use kubectl port-forward for each service
# or use the raw ALB hostname and switch services by changing path.
##############################################################

# ─── App (boutique frontend) ────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: boutique-app-route
  namespace: boutique
spec:
  parentRefs:
    - name: kubeinfra-gateway
      namespace: default
  hostnames: ["app.kubeinfra.site"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
---
# ─── ArgoCD ─────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
    - name: kubeinfra-gateway
      namespace: default
  hostnames: ["argocd.kubeinfra.site"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
---
# ─── Grafana ────────────────────────────────────────────────
